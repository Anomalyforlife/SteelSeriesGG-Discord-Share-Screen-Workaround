name: Build & Release

on:
  push:
    paths:
      - 'version.txt'
    branches:
      - main

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version
        id: version
        shell: pwsh
        run: |
          $ver = (Get-Content version.txt -Raw).Trim()
          echo "VERSION=$ver" >> $env:GITHUB_OUTPUT
          echo "Version: $ver"

      - name: Find csc.exe
        id: csc
        shell: pwsh
        run: |
          $csc = Get-ChildItem "C:\Windows\Microsoft.NET\Framework64" -Recurse -Filter "csc.exe" |
                 Sort-Object FullName -Descending | Select-Object -First 1 -ExpandProperty FullName
          echo "PATH=$csc" >> $env:GITHUB_OUTPUT
          echo "Found: $csc"

      - name: Compile MuteDiscord.exe
        shell: pwsh
        run: |
          & "${{ steps.csc.outputs.PATH }}" /target:winexe `
                 /win32icon:assets\icon.ico `
                 /reference:System.Windows.Forms.dll `
                 /reference:System.Drawing.dll `
                 /out:MuteDiscord.exe `
                 MuteDiscord.cs
          if ($LASTEXITCODE -ne 0) { exit 1 }

      - name: Compile Installer.exe
        shell: pwsh
        run: |
          & "${{ steps.csc.outputs.PATH }}" /target:exe `
                 /win32icon:assets\icon.ico `
                 /resource:MuteDiscord.exe,MuteDiscord.exe `
                 /resource:assets\icon.png,icon.png `
                 /out:Installer.exe `
                 Installer.cs
          if ($LASTEXITCODE -ne 0) { exit 1 }

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: MuteDiscord v${{ steps.version.outputs.VERSION }}
          body: |
            ## MuteDiscord v${{ steps.version.outputs.VERSION }}

            Scarica `Installer.exe` ed eseguilo per installare MuteDiscord.
          files: Installer.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
